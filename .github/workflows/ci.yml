name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap third-party cache
        shell: pwsh
        run: ./scripts/bootstrap_third_party.ps1

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:/vcpkg
          C:/vcpkg/bootstrap-vcpkg.bat -disableMetrics

      - name: Configure
        run: cmake --preset ninja-release-ci
        env:
          VCPKG_ROOT: C:/vcpkg

      - name: Build
        run: cmake --build --preset release-ci

      - name: Test
        run: ctest --preset release-tests
